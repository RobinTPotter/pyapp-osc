name: Build Kivy Android APK

on:
  push:
    paths-ignore:
      - 'readme.md'
      - 'README.md'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Version in buildozer.spec
        run: |
          sed -i "s/version = 0.1/version = 0.1.${{ github.run_number }}/" buildozer.spec

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libssl-dev \
            libffi-dev \
            python3-dev \
            python3-pip \
            cython3 \
            git \
            wget \
            zip \
            unzip
          
          # Upgrade to latest autotools (fixes libffi autoconf issues)
          sudo apt-get install -y --only-upgrade autoconf automake libtool 2>/dev/null || true

      - name: Set up debug keystore
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore

      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install \
            buildozer==1.5.0 \
            python-for-android==2024.1.21 \
            "cython<3" \
            kivy==2.3.0
          
          # Patch p4a's libffi recipe to run autoupdate on configure.ac before autogen.sh
          python3 << 'EOFPATCH'
          import os
          import re
          import pythonforandroid
          
          p4a_dir = os.path.dirname(pythonforandroid.__file__)
          libffi_recipe = os.path.join(p4a_dir, "recipes/libffi/__init__.py")
          
          if os.path.exists(libffi_recipe):
              with open(libffi_recipe, 'r') as f:
                  content = f.read()
              
              # Add subprocess import if not present
              if "import subprocess" not in content:
                  content = content.replace("import os", "import os\nimport subprocess")
              
              # Inject autoupdate call before autogen.sh if not already there
              if "autoupdate" not in content:
                  pattern = r"(shprint\(sh\.Command\('\./autogen\.sh'\))"
                  replacement = r"subprocess.run(['autoupdate', 'configure.ac'], env=env, capture_output=True, cwd=self.get_build_dir(arch))\n            \1"
                  content = re.sub(pattern, replacement, content)
                  
                  with open(libffi_recipe, 'w') as f:
                      f.write(content)
                  print("Successfully patched libffi recipe to run autoupdate before autogen.sh")
              else:
                  print("libffi recipe already patched or uses autoupdate")
          else:
              print(f"libffi recipe not found at {libffi_recipe}")
          EOFPATCH

      - name: Build APK with Buildozer
        env:
          P4A_RELEASE_KEYSTORE: /home/runner/.android/debug.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: android
          P4A_RELEASE_KEYALIAS_PASSWD: android
          P4A_RELEASE_KEYALIAS: androiddebugkey
        run: |
          buildozer android release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: apk
          path: bin/*.apk
          retention-days: 30
