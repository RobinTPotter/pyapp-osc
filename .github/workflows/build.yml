name: Build Kivy Android APK

on:
  push:
    paths-ignore:
      - 'readme.md'
      - 'README.md'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Version in buildozer.spec
        run: |
          sed -i "s/version = 0.1/version = 0.1.${{ github.run_number }}/" buildozer.spec
      - name: Setup consistent debug keystore
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Remove problematic PPAs
        run: |
          sudo add-apt-repository --remove ppa:openjdk-r/ppa || true
          sudo apt-get update || true
      - name: Install build dependencies
        run: |
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev python3-pip cython3 git
      - name: Install buildozer and Kivy
        run: |
          pip install --upgrade pip
          pip install buildozer cython kivy
      - name: Build with Buildozer
        env:
          P4A_RELEASE_KEYSTORE: /home/runner/.android/debug.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: android
          P4A_RELEASE_KEYALIAS_PASSWD: android
          P4A_RELEASE_KEYALIAS: androiddebugkey
        run: |
          buildozer android release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk




