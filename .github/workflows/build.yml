name: Build Kivy Android APK

on:
  push:
    paths-ignore:
      - 'readme.md'
      - 'README.md'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Version in buildozer.spec
        run: |
          sed -i "s/version = 0.1/version = 0.1.${{ github.run_number }}/" buildozer.spec

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: 25.2.9519653
          build-tools-version: 35.0.0

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            python3-pip \
            cython3 \
            git \
            wget \
            zip \
            unzip

      - name: Set up debug keystore
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore

      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython kivy

      - name: Build APK with Buildozer
        env:
          ANDROID_SDK_ROOT: /home/runner/Android/sdk
          ANDROID_HOME: /home/runner/Android/sdk
          ANDROID_NDK_ROOT: /home/runner/Android/ndk/25.2.9519653
          P4A_RELEASE_KEYSTORE: /home/runner/.android/debug.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: android
          P4A_RELEASE_KEYALIAS_PASSWD: android
          P4A_RELEASE_KEYALIAS: androiddebugkey
        run: |
          buildozer android release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: apk
          path: bin/*.apk
          retention-days: 30